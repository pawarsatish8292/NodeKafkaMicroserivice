apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2   # 🔥 horizontal scaling
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: docker.io/library/gateway-service:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-secret