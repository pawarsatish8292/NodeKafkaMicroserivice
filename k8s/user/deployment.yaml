apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
spec:
  replicas: 1   # HPA will control this
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: user-service:v2
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: user-config
            - secretRef:
                name: user-secret

          # 🔥 REQUIRED FOR AUTOSCALING
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5