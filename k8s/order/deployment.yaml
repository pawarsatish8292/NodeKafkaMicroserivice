apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: order-service:v2
          imagePullPolicy: Never   # 🔥 IMPORTANT for minikube

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: order-config
            - secretRef:
                name: order-secret

          # ✅ Health checks (VERY IMPORTANT)
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10

          # ✅ Resource limits (required for HPA later)
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"